<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略健康度評估系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d2e;
  --border: #2a2d3e;
  --text: #e0e0e0;
  --text2: #8a8fa0;
  --green: #00d4aa;
  --red: #ff4757;
  --blue: #4a90d9;
  --orange: #ff9f43;
  --purple: #a855f7;
  --yellow: #fbbf24;
  --cyan: #22d3ee;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.nav { display:flex; background:#141627; border-bottom:1px solid var(--border); padding:0 24px; position:sticky; top:0; z-index:100; }
.nav-item { padding:14px 28px; cursor:pointer; font-size:15px; color:var(--text2); border-bottom:3px solid transparent; transition:.2s; font-weight:500; }
.nav-item:hover { color:var(--text); }
.nav-item.active { color:var(--green); border-bottom-color:var(--green); }
.nav-title { display:flex; align-items:center; padding:14px 0; margin-right:auto; font-size:18px; font-weight:700; color:var(--green); letter-spacing:1px; }
.page { display:none; padding:20px 24px; max-width:1600px; margin:0 auto; }
.page.active { display:block; }

/* Upload area */
.upload-zone { border:2px dashed var(--border); border-radius:12px; padding:40px; text-align:center; cursor:pointer; transition:.3s; margin-bottom:24px; background:var(--card); }
.upload-zone:hover,.upload-zone.drag { border-color:var(--green); background:#1a2a2e; }
.upload-zone h3 { color:var(--text2); margin-bottom:8px; font-weight:400; }
.upload-zone .hint { color:var(--text2); font-size:13px; }
.upload-zone input { display:none; }

/* Cards */
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
.metric-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
.metric-card .label { font-size:12px; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.metric-card .value { font-size:22px; font-weight:700; }
.metric-card .sub { font-size:11px; color:var(--text2); margin-top:4px; }
.positive { color:var(--green); }
.negative { color:var(--red); }
.neutral { color:var(--blue); }

.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.chart-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
.chart-box.full { grid-column:1/-1; }
.chart-box h4 { color:var(--text2); font-size:13px; margin-bottom:12px; font-weight:500; }
.chart-box canvas { width:100% !important; }

/* Table */
.tbl-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow-x:auto; margin-bottom:20px; }
.tbl-wrap h4 { color:var(--text2); font-size:13px; padding:14px 16px 0; font-weight:500; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th,td { padding:10px 14px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
th { color:var(--text2); font-weight:500; font-size:12px; text-transform:uppercase; position:sticky; top:0; background:var(--card); }
td:first-child,th:first-child { text-align:left; }
tbody tr:hover { background:#1f2235; }

/* Page2 multi */
.file-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.chip { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:13px; display:flex; align-items:center; gap:6px; }
.chip .dot { width:10px; height:10px; border-radius:50%; }
.chip .remove { cursor:pointer; color:var(--red); font-weight:700; margin-left:4px; }
.compare-table { max-height:600px; overflow:auto; }
.pos-limit-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 20px; margin-bottom:16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.pos-limit-panel label { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; }
.pos-limit-panel input[type=number] { width:80px; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--green); font-size:16px; font-weight:700; text-align:center; outline:none; -moz-appearance:textfield; }
.pos-limit-panel input[type=number]::-webkit-inner-spin-button,.pos-limit-panel input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
.pos-limit-panel input[type=number]:focus { border-color:var(--green); }
.pos-limit-panel .btn { padding:8px 18px; background:var(--green); color:var(--bg); border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:.2s; }
.pos-limit-panel .btn:hover { background:#00b894; }
.pos-limit-info { font-size:13px; color:var(--orange); font-weight:500; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Grade badges */
.grade { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:700; }
.grade-S { background:#00d4aa33; color:var(--green); }
.grade-A { background:#4a90d933; color:var(--blue); }
.grade-B { background:#fbbf2433; color:var(--yellow); }
.grade-C { background:#ff9f4333; color:var(--orange); }
.grade-D { background:#ff475733; color:var(--red); }

.health-bar { display:flex; align-items:center; gap:12px; margin-bottom:24px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; }
.health-score { font-size:48px; font-weight:800; min-width:80px; text-align:center; }
.health-details { flex:1; }
.health-bar-visual { height:12px; background:#1f2235; border-radius:6px; overflow:hidden; flex:1; min-width:200px; }
.health-bar-fill { height:100%; border-radius:6px; transition:width .6s; }

.section-title { font-size:16px; font-weight:600; color:var(--text); margin:20px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }

@media(max-width:900px) { .chart-row { grid-template-columns:1fr; } .metrics-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:500px) { .metrics-grid { grid-template-columns:1fr; } }

/* Distribution analysis page */
.dist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.dist-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.dist-card.full { grid-column: 1 / -1; }
.dist-card h4 { color: var(--text2); font-size: 13px; margin-bottom: 12px; font-weight: 500; }
.dist-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.dist-stat .dlabel { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
.dist-stat .dvalue { font-weight: 600; font-size: 15px; margin-top: 2px; }
.env-box { background: #141627; border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 14px; font-size: 13px; line-height: 1.8; }
@media(max-width:900px) { .dist-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-title">策略健康度評估系統</div>
  <div class="nav-item active" onclick="switchPage(0)">單一策略評估</div>
  <div class="nav-item" onclick="switchPage(1)">組合策略評估</div>
  <div class="nav-item" onclick="switchPage(2)">交易分配分析</div>
</div>

<!-- ===== PAGE 1: Single Strategy ===== -->
<div class="page active" id="page0">
  <div class="upload-zone" id="upload1" onclick="document.getElementById('file1').click()">
    <h3>拖曳或點擊上傳回測報告</h3>
    <div class="hint">支援三大平台：XQ (CSV) / MultiCharts (XLSX) / TradingView (XLSX)</div>
    <input type="file" id="file1" accept=".csv,.xlsx,.xls">
  </div>
  <div id="result1"></div>
</div>

<!-- ===== PAGE 2: Portfolio ===== -->
<div class="page" id="page1">
  <div class="upload-zone" id="upload2" onclick="document.getElementById('file2').click()">
    <h3>拖曳或點擊上傳回測報告（最多 10 個）</h3>
    <div class="hint">每個檔案為一個策略（CSV / XLSX），系統將進行組合評估與比較分析</div>
    <input type="file" id="file2" accept=".csv,.xlsx,.xls" multiple>
  </div>
  <div class="file-chips" id="chips2"></div>
  <div class="pos-limit-panel" id="posLimitPanel" style="display:none">
    <label>部位上限</label>
    <input type="number" id="posLimitInput" min="0" max="100" value="0" onchange="renderPortfolio()" onkeydown="if(event.key==='Enter')renderPortfolio()">
    <span style="font-size:13px;color:var(--text2)">口</span>
    <button class="btn" onclick="renderPortfolio()">套用</button>
    <span style="font-size:12px;color:var(--text2)">同時間最大持倉口數（0 = 不限制）</span>
    <span class="pos-limit-info" id="posLimitInfo"></span>
  </div>
  <div id="result2"></div>
</div>

<!-- ===== PAGE 3: Distribution Analysis ===== -->
<div class="page" id="page2">
  <div class="upload-zone" id="upload3" onclick="document.getElementById('file3').click()">
    <h3>拖曳或點擊上傳回測報告（最多 10 個）</h3>
    <div class="hint">上傳策略回測報告，分析交易損益常態分配與適合的大環境</div>
    <input type="file" id="file3" accept=".csv,.xlsx,.xls" multiple>
  </div>
  <div class="file-chips" id="chips3"></div>
  <div id="result3"></div>
</div>

<script>
// ============================================================
// GLOBALS
// ============================================================
const COLORS = ['#00d4aa','#4a90d9','#ff9f43','#a855f7','#ff4757','#22d3ee','#fbbf24','#f472b6','#34d399','#fb923c'];
let charts = {};
let portfolioData = []; // array of {name, trades, metrics}
let distData = []; // array of {name, trades, metrics} for distribution page

// ============================================================
// NAV
// ============================================================
function switchPage(idx) {
  document.querySelectorAll('.page').forEach((p,i) => { p.classList.toggle('active', i===idx); });
  document.querySelectorAll('.nav-item:not(.nav-title)').forEach((n,i) => { n.classList.toggle('active', i===idx); });
}

// ============================================================
// FILE HANDLING
// ============================================================
function setupDrop(zoneId, inputId, handler) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('drag'); }));
  ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('drag'); }));
  zone.addEventListener('drop', ev => { handler(ev.dataTransfer.files); });
  input.addEventListener('change', ev => { handler(ev.target.files); });
}

setupDrop('upload1','file1', files => { if(files[0]) parseFile(files[0], data => renderSingle(data, files[0].name)); });
setupDrop('upload2','file2', files => {
  for(let f of files) {
    if(portfolioData.length >= 10) break;
    parseFile(f, data => { portfolioData.push({name:f.name.replace(/\.(csv|xlsx?)$/i,''), trades:data, metrics:calcMetrics(data)}); renderPortfolio(); });
  }
});
setupDrop('upload3','file3', files => {
  for(let f of files) {
    if(distData.length >= 10) break;
    parseFile(f, data => { distData.push({name:f.name.replace(/\.(csv|xlsx?)$/i,''), trades:data, metrics:calcMetrics(data)}); renderDistribution(); });
  }
});

function parseCSV(file, cb) {
  // Try UTF-8 first, then Big5 if header doesn't contain expected Chinese
  const tryEncoding = (enc, fallback) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      const firstLine = text.split(/\r?\n/)[0];
      // Check if header looks correct (contains Chinese chars like 進場 or 商品)
      const hasChinese = /[\u4e00-\u9fff]/.test(firstLine);
      const hasExpectedHeader = /進場|商品|獲利|出場/.test(firstLine);
      if(hasChinese && hasExpectedHeader) {
        cb(parseCSVText(text));
      } else if(fallback) {
        tryEncoding(fallback, null);
      } else {
        // Last resort: use whatever we got
        cb(parseCSVText(text));
      }
    };
    reader.readAsText(file, enc);
  };
  tryEncoding('utf-8', 'big5');
}

function parseCSVText(text) {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return [];
  // Skip header
  const trades = [];
  for(let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if(cols.length < 15) continue;
    trades.push({
      product: cols[0].replace(/"/g,''),
      code: cols[1],
      seq: parseInt(cols[2]),
      entryTime: cols[3],
      entryDir: cols[4],
      entryPrice: parseFloat(cols[5]),
      exitTime: cols[6],
      exitDir: cols[7],
      exitPrice: parseFloat(cols[8]),
      holdBars: parseInt(cols[9]),
      qty: parseInt(cols[10]),
      profit: parseFloat(cols[11]),
      returnRate: parseFloat(cols[12]),
      cumProfit: parseFloat(cols[13]),
      cumReturn: parseFloat(cols[14]),
      entrySignal: cols[15] || '',
      exitSignal: cols[16] || ''
    });
  }
  return trades;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuote = false;
  for(let i = 0; i < line.length; i++) {
    const c = line[i];
    if(inQuote) {
      if(c === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if(c === '"') inQuote = false;
      else current += c;
    } else {
      if(c === '"') inQuote = true;
      else if(c === ',') { result.push(current.trim()); current = ''; }
      else current += c;
    }
  }
  result.push(current.trim());
  return result;
}

// ============================================================
// XLSX PARSING (MultiCharts / TradingView)
// ============================================================
function parseFile(file, cb) {
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext === 'csv') { parseCSV(file, cb); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:'array', cellDates:true});
    if(wb.SheetNames.includes('交易明細')) { cb(parseMCWorkbook(wb)); }
    else if(wb.SheetNames.includes('交易清單')) { cb(parseTVWorkbook(wb)); }
    else { alert('無法識別 XLSX 格式，請確認為 MultiCharts 或 TradingView 回測報告'); }
  };
  reader.readAsArrayBuffer(file);
}

function xlsxDateStr(dateVal, timeVal) {
  if(!dateVal) return '';
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  let h='00', min='00';
  if(timeVal instanceof Date) { h=String(timeVal.getHours()).padStart(2,'0'); min=String(timeVal.getMinutes()).padStart(2,'0'); }
  else if(typeof timeVal==='number') { const t=Math.round(timeVal*24*60); h=String(Math.floor(t/60)%24).padStart(2,'0'); min=String(t%60).padStart(2,'0'); }
  return `${y}/${m}/${day} ${h}:${min}`;
}

function xlsxDateTimeStr(val) {
  if(!val) return '';
  const d = val instanceof Date ? val : new Date(val);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function parseMCWorkbook(wb) {
  const ws = wb.Sheets['交易明細'];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let headerIdx = -1;
  for(let i=0; i<Math.min(10,rows.length); i++) { if(rows[i]&&rows[i][0]==='交易編號') { headerIdx=i; break; } }
  if(headerIdx<0) return [];
  const trades = [];
  let i = headerIdx+1;
  while(i < rows.length-1) {
    const er=rows[i], xr=rows[i+1];
    if(!er||er[0]==null) { i++; continue; }
    if(!xr) break;
    const isLong = String(er[3]||'').includes('Long');
    trades.push({
      product:er[1]||'', code:er[1]||'', seq:er[0],
      entryTime:xlsxDateStr(er[5],er[6]), entryDir:isLong?'買進':'賣出', entryPrice:er[7]||0,
      exitTime:xlsxDateStr(xr[5],xr[6]), exitDir:isLong?'賣出':'買進', exitPrice:xr[7]||0,
      holdBars:0, qty:er[8]||1,
      profit:er[9]||0, returnRate:(er[10]||0)*100,
      cumProfit:er[11]||0, cumReturn:er[12]||0,
      entrySignal:er[4]||'', exitSignal:xr[4]||''
    });
    i+=2;
  }
  return trades;
}

function parseTVWorkbook(wb) {
  let product = '';
  if(wb.Sheets['屬性']) {
    const props = XLSX.utils.sheet_to_json(wb.Sheets['屬性'], {header:1, defval:null});
    for(const row of props) { if(row[0]==='商品') { product=row[1]||''; break; } }
  }
  const ws = wb.Sheets['交易清單'];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  const trades = [];
  for(let i=1; i<rows.length; i+=2) {
    const r1=rows[i], r2=rows[i+1];
    if(!r1||!r2) break;
    let er,xr;
    if(String(r1[1]||'').includes('進場')) { er=r1; xr=r2; } else { er=r2; xr=r1; }
    const isLong = String(er[1]||'').includes('多頭');
    trades.push({
      product, code:product, seq:r1[0],
      entryTime:xlsxDateTimeStr(er[2]), entryDir:isLong?'買進':'賣出', entryPrice:er[4]||0,
      exitTime:xlsxDateTimeStr(xr[2]), exitDir:isLong?'賣出':'買進', exitPrice:xr[4]||0,
      holdBars:0, qty:er[5]||1,
      profit:r1[7]||0, returnRate:r1[8]||0,
      cumProfit:r1[13]||0, cumReturn:r1[14]||0,
      entrySignal:String(er[3]||''), exitSignal:String(xr[3]||'')
    });
  }
  return trades;
}

// ============================================================
// METRICS CALCULATION
// ============================================================
function calcMetrics(trades) {
  if(!trades.length) return null;
  const n = trades.length;
  const profits = trades.map(t => t.profit);
  const returns = trades.map(t => t.returnRate);

  const wins = profits.filter(p => p > 0);
  const losses = profits.filter(p => p < 0);
  const even = profits.filter(p => p === 0);

  const totalProfit = profits.reduce((a,b) => a+b, 0);
  const grossProfit = wins.reduce((a,b) => a+b, 0);
  const grossLoss = Math.abs(losses.reduce((a,b) => a+b, 0));

  const winRate = wins.length / n;
  const profitFactor = grossLoss === 0 ? Infinity : grossProfit / grossLoss;
  const avgProfit = totalProfit / n;
  const avgWin = wins.length ? grossProfit / wins.length : 0;
  const avgLoss = losses.length ? grossLoss / losses.length : 0;
  const payoffRatio = avgLoss === 0 ? Infinity : avgWin / avgLoss;

  const maxProfit = Math.max(...profits);
  const maxLoss = Math.min(...profits);

  // Max Drawdown (based on cumulative profit)
  let peak = 0, maxDD = 0, maxDDpct = 0;
  let cumPnL = 0;
  const equityCurve = [0];
  for(const p of profits) {
    cumPnL += p;
    equityCurve.push(cumPnL);
    if(cumPnL > peak) peak = cumPnL;
    const dd = peak - cumPnL;
    if(dd > maxDD) maxDD = dd;
  }
  // MDD % relative to initial + peak
  if(peak > 0) maxDDpct = maxDD / peak;

  // Consecutive wins/losses
  let maxConsWin = 0, maxConsLoss = 0, cw = 0, cl = 0;
  for(const p of profits) {
    if(p > 0) { cw++; cl=0; maxConsWin = Math.max(maxConsWin, cw); }
    else if(p < 0) { cl++; cw=0; maxConsLoss = Math.max(maxConsLoss, cl); }
    else { cw=0; cl=0; }
  }

  // Average holding bars
  const avgHold = trades.reduce((a,t) => a + t.holdBars, 0) / n;

  // Long vs Short
  const longs = trades.filter(t => t.entryDir === '買進');
  const shorts = trades.filter(t => t.entryDir === '賣出');
  const longProfit = longs.reduce((a,t) => a + t.profit, 0);
  const shortProfit = shorts.reduce((a,t) => a + t.profit, 0);
  const longWinRate = longs.length ? longs.filter(t => t.profit > 0).length / longs.length : 0;
  const shortWinRate = shorts.length ? shorts.filter(t => t.profit > 0).length / shorts.length : 0;

  // Monthly breakdown
  const monthly = {};
  for(const t of trades) {
    const m = t.entryTime.substring(0,7).replace('/','-');
    if(!monthly[m]) monthly[m] = { profit:0, count:0, wins:0 };
    monthly[m].profit += t.profit;
    monthly[m].count++;
    if(t.profit > 0) monthly[m].wins++;
  }

  // Yearly breakdown
  const yearly = {};
  for(const t of trades) {
    const y = t.entryTime.substring(0,4);
    if(!yearly[y]) yearly[y] = { profit:0, count:0, wins:0 };
    yearly[y].profit += t.profit;
    yearly[y].count++;
    if(t.profit > 0) yearly[y].wins++;
  }

  // Sharpe-like ratio (using trade returns)
  const avgRet = returns.reduce((a,b)=>a+b,0) / n;
  const stdRet = Math.sqrt(returns.reduce((a,r)=>a+(r-avgRet)**2,0) / n);
  const sharpe = stdRet === 0 ? 0 : (avgRet / stdRet) * Math.sqrt(252);

  // Recovery factor
  const recoveryFactor = maxDD === 0 ? Infinity : totalProfit / maxDD;

  // Expectancy
  const expectancy = (winRate * avgWin) - ((1 - winRate) * avgLoss);

  // SQN (System Quality Number) = sqrt(N) * expectancy / stdDev(profit)
  const stdProfit = Math.sqrt(profits.reduce((a,p) => a + (p - avgProfit)**2, 0) / n);
  const sqn = stdProfit === 0 ? 0 : Math.sqrt(n) * avgProfit / stdProfit;

  // Profit per bar (efficiency)
  const totalBars = trades.reduce((a,t) => a + t.holdBars, 0);
  const profitPerBar = totalBars === 0 ? 0 : totalProfit / totalBars;

  // Date range
  const startDate = trades[0].entryTime.substring(0,10);
  const endDate = trades[n-1].exitTime.substring(0,10);

  return {
    n, wins: wins.length, losses: losses.length, even: even.length,
    winRate, totalProfit, grossProfit, grossLoss, profitFactor,
    avgProfit, avgWin, avgLoss, payoffRatio,
    maxProfit, maxLoss, maxDD, maxDDpct,
    maxConsWin, maxConsLoss, avgHold,
    longs: longs.length, shorts: shorts.length,
    longProfit, shortProfit, longWinRate, shortWinRate,
    monthly, yearly, equityCurve, sharpe, recoveryFactor,
    expectancy, sqn, profitPerBar, startDate, endDate,
    profits, returns
  };
}

// ============================================================
// HEALTH SCORE
// ============================================================
function calcHealthScore(m) {
  let score = 0;
  // 1. Win Rate (15 pts)
  if(m.winRate >= 0.55) score += 15;
  else if(m.winRate >= 0.45) score += 10;
  else if(m.winRate >= 0.35) score += 5;

  // 2. Profit Factor (20 pts)
  if(m.profitFactor >= 2.0) score += 20;
  else if(m.profitFactor >= 1.5) score += 15;
  else if(m.profitFactor >= 1.2) score += 10;
  else if(m.profitFactor >= 1.0) score += 5;

  // 3. Max Drawdown % (15 pts)
  if(m.maxDDpct <= 0.1) score += 15;
  else if(m.maxDDpct <= 0.2) score += 10;
  else if(m.maxDDpct <= 0.35) score += 5;

  // 4. Recovery Factor (10 pts)
  if(m.recoveryFactor >= 5) score += 10;
  else if(m.recoveryFactor >= 3) score += 7;
  else if(m.recoveryFactor >= 1.5) score += 4;

  // 5. Payoff Ratio (10 pts)
  if(m.payoffRatio >= 2.0) score += 10;
  else if(m.payoffRatio >= 1.5) score += 7;
  else if(m.payoffRatio >= 1.0) score += 4;

  // 6. SQN (10 pts)
  if(m.sqn >= 3) score += 10;
  else if(m.sqn >= 2) score += 7;
  else if(m.sqn >= 1) score += 4;

  // 7. Consecutive losses (10 pts)
  if(m.maxConsLoss <= 4) score += 10;
  else if(m.maxConsLoss <= 7) score += 6;
  else if(m.maxConsLoss <= 10) score += 3;

  // 8. Sharpe (10 pts)
  if(m.sharpe >= 2) score += 10;
  else if(m.sharpe >= 1) score += 7;
  else if(m.sharpe >= 0.5) score += 4;

  return score;
}

function getGrade(score) {
  if(score >= 80) return 'S';
  if(score >= 65) return 'A';
  if(score >= 50) return 'B';
  if(score >= 35) return 'C';
  return 'D';
}

function gradeColor(g) {
  return {S:'var(--green)',A:'var(--blue)',B:'var(--yellow)',C:'var(--orange)',D:'var(--red)'}[g];
}

function calcCorrelation(m1, m2, months) {
  const v1 = [], v2 = [];
  for(const m of months) {
    v1.push(m1[m] ? m1[m].profit : 0);
    v2.push(m2[m] ? m2[m].profit : 0);
  }
  const n = v1.length;
  if(n < 2) return 0;
  const mean1 = v1.reduce((a,b)=>a+b,0)/n;
  const mean2 = v2.reduce((a,b)=>a+b,0)/n;
  let cov=0, std1=0, std2=0;
  for(let i=0;i<n;i++){
    cov += (v1[i]-mean1)*(v2[i]-mean2);
    std1 += (v1[i]-mean1)**2;
    std2 += (v2[i]-mean2)**2;
  }
  const denom = Math.sqrt(std1*std2);
  return denom === 0 ? 0 : cov / denom;
}

// ============================================================
// OVERLAP ANALYSIS (策略重複度)
// ============================================================
function calcOverlapStats(allTrades, maxPos) {
  if(!allTrades.length || maxPos <= 0) return null;

  // Build timeline events: +1 at entry, -1 at exit
  const events = [];
  for(const trade of allTrades) {
    events.push({ time: trade.entryTime, delta: 1 });
    events.push({ time: trade.exitTime, delta: -1 });
  }
  // Sort: by time, exits (-1) before entries (+1) at same timestamp
  events.sort((a,b) => {
    const cmp = a.time.localeCompare(b.time);
    if(cmp !== 0) return cmp;
    return a.delta - b.delta;
  });

  function parseT(s) {
    const p = s.split(/[\/\s:]/);
    return new Date(+p[0], p[1]-1, +p[2], +(p[3]||0), +(p[4]||0));
  }

  const t0 = parseT(events[0].time);
  const tEnd = parseT(events[events.length - 1].time);
  const totalMs = tEnd - t0;
  if(totalMs <= 0) return null;

  let pos = 0, lastT = t0;
  let msOver = 0, msOver2x = 0;
  let maxConcurrent = 0;

  for(const ev of events) {
    const t = parseT(ev.time);
    const dt = t - lastT;
    if(dt > 0) {
      if(pos >= maxPos)     msOver   += dt;
      if(pos >= maxPos * 2) msOver2x += dt;
    }
    pos += ev.delta;
    if(pos > maxConcurrent) maxConcurrent = pos;
    lastT = t;
  }

  return {
    pctWithinLimit: 1 - msOver / totalMs,   // % 時間 <= 部位上限（不重複）
    pctOverLimit:  msOver / totalMs,          // % 時間 >= 部位上限
    pctOver2x:     msOver2x / totalMs,        // % 時間 >= 2 倍部位上限
    maxConcurrent
  };
}

// ============================================================
// POSITION LIMIT
// ============================================================
function applyPositionLimit(allTrades, maxPos) {
  const sorted = [...allTrades].sort((a,b) => a.entryTime.localeCompare(b.entryTime));
  const accepted = [];
  const openExits = []; // sorted exit times of currently open positions

  for(const trade of sorted) {
    // Remove positions that have closed (exitTime <= current entryTime)
    while(openExits.length > 0 && openExits[0] <= trade.entryTime) {
      openExits.shift();
    }
    if(openExits.length < maxPos) {
      accepted.push(trade);
      // Insert exitTime in sorted order
      let idx = openExits.length;
      for(let i = 0; i < openExits.length; i++) {
        if(trade.exitTime <= openExits[i]) { idx = i; break; }
      }
      openExits.splice(idx, 0, trade.exitTime);
    }
  }
  return accepted;
}

// ----- Statistical helpers -----
function calcSkewness(arr) {
  const n = arr.length, mean = arr.reduce((a,b)=>a+b,0)/n;
  const m2 = arr.reduce((a,v)=>a+(v-mean)**2,0)/n;
  const m3 = arr.reduce((a,v)=>a+(v-mean)**3,0)/n;
  return m2 === 0 ? 0 : m3 / Math.pow(m2, 1.5);
}

function calcKurtosis(arr) {
  const n = arr.length, mean = arr.reduce((a,b)=>a+b,0)/n;
  const m2 = arr.reduce((a,v)=>a+(v-mean)**2,0)/n;
  const m4 = arr.reduce((a,v)=>a+(v-mean)**4,0)/n;
  return m2 === 0 ? 0 : m4 / (m2*m2) - 3;
}

function normalPDF(x, mean, std) {
  return Math.exp(-0.5*((x-mean)/std)**2) / (std*Math.sqrt(2*Math.PI));
}

function gaussianKDE(data) {
  const n = data.length, mean = data.reduce((a,b)=>a+b,0)/n;
  const std = Math.sqrt(data.reduce((a,v)=>a+(v-mean)**2,0)/n);
  const bw = std === 0 ? 1 : 1.06 * std * Math.pow(n, -0.2);
  return function(x) {
    let sum = 0;
    for(const xi of data) sum += Math.exp(-0.5*((x-xi)/bw)**2);
    return sum / (n * bw * Math.sqrt(2*Math.PI));
  };
}

function normalQuantile(p) {
  if(p <= 0) return -8; if(p >= 1) return 8; if(p === 0.5) return 0;
  const a=[-3.969683028665376e1,2.209460984245205e2,-2.759285104469687e2,1.383577518672690e2,-3.066479806614716e1,2.506628277459239e0];
  const b=[-5.447609879822406e1,1.615858368580409e2,-1.556989798598866e2,6.680131188771972e1,-1.328068155288572e1];
  const c=[-7.784894002430293e-3,-3.223964580411365e-1,-2.400758277161838e0,-2.549732539343734e0,4.374664141464968e0,2.938163982698783e0];
  const d=[7.784695709041462e-3,3.224671290700398e-1,2.445134137142996e0,3.754408661907416e0];
  const pL=0.02425, pH=1-pL;
  let q,r;
  if(p<pL){q=Math.sqrt(-2*Math.log(p));return(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=pH){q=p-0.5;r=q*q;return(((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));return-(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}

function jarqueBera(arr) {
  const n=arr.length, s=calcSkewness(arr), k=calcKurtosis(arr);
  const jb=(n/6)*(s*s+k*k/4);
  return {stat:jb, p:Math.min(Math.exp(-jb/2),1)};
}

function analyzeMarketEnv(m, trades) {
  const lc=trades.filter(t=>t.entryDir==='買進').length, sc=trades.filter(t=>t.entryDir==='賣出').length, total=trades.length;
  const lp=lc/total, sp=sc/total;
  let dir; if(lp>0.8) dir='純多'; else if(sp>0.8) dir='純空'; else if(lp>0.55) dir='偏多'; else if(sp>0.55) dir='偏空'; else dir='多空雙向';
  let style; const ab=m.avgHold;
  if(ab<=5) style='極短線（Scalping）'; else if(ab<=15) style='短線當沖/短波段'; else if(ab<=50) style='波段交易'; else if(ab<=100) style='中長波段'; else style='長波段/趨勢跟蹤';
  const envs=[], skew=calcSkewness(m.profits), kurt=calcKurtosis(m.profits);
  if(dir==='純多'||dir==='偏多'){
    if(style.includes('長波段')||style.includes('中長波段')){envs.push('✅ 多頭趨勢行情（牛市、指數上漲趨勢）');envs.push('⚠️ 不適合：空頭趨勢、大幅回調行情');}
    else if(style.includes('波段')){envs.push('✅ 多頭波段行情（回調後反彈、區間突破向上）');envs.push(m.winRate<0.4?'✅ 低勝率高賺賠比 → 適合趨勢啟動階段':'✅ 震盪偏多格局也可運作');envs.push('⚠️ 不適合：持續下跌、空頭趨勢');}
    else{envs.push('✅ 日內多頭動能行情');envs.push('✅ 開盤後快速拉升/慣性上漲行情');envs.push('⚠️ 不適合：開低走低、空頭日');}
  } else if(dir==='純空'||dir==='偏空'){
    if(style.includes('長波段')||style.includes('中長波段')){envs.push('✅ 空頭趨勢行情（熊市、指數持續下跌）');envs.push('⚠️ 不適合：多頭趨勢、V型反轉');}
    else if(style.includes('波段')){envs.push('✅ 空頭波段行情（反彈後續跌、區間跌破）');envs.push('✅ 高檔震盪轉弱格局');envs.push('⚠️ 不適合：強勢多頭、軋空行情');}
    else{envs.push('✅ 日內空頭動能行情（跳空下殺、破底）');envs.push('✅ 開盤後慣性下跌行情');envs.push('⚠️ 不適合：多頭強勢日、開高走高');}
  } else {envs.push('✅ 震盪行情（雙向操作）');envs.push('✅ 無明確方向的區間盤整');}
  if(skew>1) envs.push('📊 右偏分配：少數大賺彌補多數小虧（趨勢策略特徵）');
  else if(skew<-1) envs.push('📊 左偏分配：多數小賺但偶有大虧（注意風控）');
  else envs.push('📊 分配接近對稱：損益分配相對均衡');
  if(kurt>3) envs.push('📊 高峰態（尖峰肥尾）：極端損益出現頻率較高');
  else if(kurt<-0.5) envs.push('📊 低峰態（扁平分配）：損益分散較均勻');
  return {dir,style,envs,lc,sc};
}

function dstat(label, value) { return `<div class="dist-stat"><div class="dlabel">${label}</div><div class="dvalue">${value}</div></div>`; }

function sampleStd(arr) {
  const n=arr.length, mean=arr.reduce((a,b)=>a+b,0)/n;
  return Math.sqrt(arr.reduce((a,v)=>a+(v-mean)**2,0)/Math.max(n-1,1));
}

        <div class="env-box">
          <div style="font-weight:600;margin-bottom:6px;color:var(--text)">適合的大環境</div>
          <div style="color:var(--text2);margin-bottom:8px">${env.dir} | ${env.style} | 平均持倉 ${m.avgHold.toFixed(1)} K棒 | 多:${env.lc} 空:${env.sc}</div>
          ${env.envs.map(e=>`<div>${e}</div>`).join('')}
        </div>
      </div>
    </div>`;
  });

  // KDE overlay comparison
  if(distData.length>=2){
    html+=`<div class="section-title">KDE 分配疊加比較</div><div class="dist-grid"><div class="dist-card full"><canvas id="kdeCompare" height="80"></canvas></div></div>`;
  }

  // Box plot comparison
  html+=`<div class="section-title">損益箱型圖${distData.length>=2?' 比較':''}</div><div class="dist-grid"><div class="dist-card full"><canvas id="boxCompare" height="80"></canvas></div></div>`;

  // QQ plots
  html+=`<div class="section-title">Q-Q Plot（常態性檢驗）</div><div class="dist-grid">`;
  distData.forEach((d,i)=>{html+=`<div class="dist-card"><h4 style="color:${COLORS[i%10]}">${d.name}</h4><canvas id="qqChart_${i}" height="150"></canvas></div>`;});
  html+=`</div>`;

  // Summary table
  html+=`<div class="section-title">綜合比較表</div><div class="tbl-wrap"><table>
    <thead><tr><th>策略</th><th>筆數</th><th>勝率</th><th>均值</th><th>標準差</th><th>偏態</th><th>峰態</th><th>PF</th><th>賺賠比</th><th>方向</th><th>風格</th><th>常態性</th></tr></thead><tbody>`;
  distData.forEach((d,i)=>{
    const m=d.metrics, p=m.profits, skew=calcSkewness(p), kurt=calcKurtosis(p), jb=jarqueBera(p), std=sampleStd(p), env=analyzeMarketEnv(m,d.trades);
    html+=`<tr><td style="color:${COLORS[i%10]}">${d.name}</td><td>${m.n}</td><td>${pct(m.winRate)}</td><td class="${m.avgProfit>=0?'positive':'negative'}">${fmt(m.avgProfit)}</td><td>${fmt(std)}</td><td>${skew.toFixed(2)}</td><td>${kurt.toFixed(2)}</td><td>${m.profitFactor===Infinity?'∞':m.profitFactor.toFixed(2)}</td><td>${m.payoffRatio===Infinity?'∞':m.payoffRatio.toFixed(2)}</td><td>${env.dir}</td><td style="font-size:11px">${env.style}</td><td class="${jb.p<0.05?'negative':'positive'}">${jb.p<0.05?'非常態':'常態'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  container.innerHTML=html;

  // Draw charts
  distData.forEach((d,i)=>drawDistAdv('distAdv_'+i, d.metrics.profits, COLORS[i%10]));
  if(distData.length>=2) drawKDECompare('kdeCompare');
  drawBoxCompare('boxCompare');
  distData.forEach((d,i)=>drawQQChart('qqChart_'+i, d.metrics.profits, COLORS[i%10]));
}

// ----- Distribution histogram + normal + KDE -----
function drawDistAdv(id, profits, color) {
  destroyChart(id);
  const n=profits.length, mean=profits.reduce((a,b)=>a+b,0)/n;
  const std=sampleStd(profits);
  const sorted=[...profits].sort((a,b)=>a-b);
  const median=sorted[Math.floor(n/2)];
  const pMin=Math.min(...profits), pMax=Math.max(...profits);
  const nBins=Math.min(50, Math.max(15, Math.floor(n/8)));
  const binSize=(pMax-pMin)/nBins||1;
  const bins=new Array(nBins).fill(0);
  for(const p of profits){let idx=Math.floor((p-pMin)/binSize);if(idx>=nBins)idx=nBins-1;bins[idx]++;}
  const totalArea=n*binSize;
  const barData=[], barColors=[];
  for(let i=0;i<nBins;i++){const x=pMin+(i+0.5)*binSize;barData.push({x,y:bins[i]/totalArea});barColors.push(x>=0?color+'99':'rgba(255,71,87,0.5)');}
  const curveN=120, xLo=pMin-std*0.5, xHi=pMax+std*0.5;
  const kde=gaussianKDE(profits), normalData=[], kdeData=[];
  for(let i=0;i<curveN;i++){const x=xLo+(xHi-xLo)*i/(curveN-1);normalData.push({x,y:normalPDF(x,mean,std)});kdeData.push({x,y:kde(x)});}

  charts[id]=new Chart(document.getElementById(id),{
    data:{datasets:[
      {type:'bar',data:barData,backgroundColor:barColors,borderColor:'rgba(255,255,255,0.2)',borderWidth:0.5,barThickness:'flex',order:3,label:'直方圖'},
      {type:'line',label:'常態 N('+fmt(mean)+', '+fmt(std)+'²)',data:normalData,borderColor:'#ff4757',borderWidth:2.5,pointRadius:0,tension:0.3,fill:false,order:1},
      {type:'line',label:'實際分配 (KDE)',data:kdeData,borderColor:'#4a90d9',borderWidth:2,borderDash:[6,3],pointRadius:0,tension:0.3,fill:false,order:2}
    ]},
    options:{responsive:true,
      scales:{
        x:{type:'linear',title:{display:true,text:'單筆損益 (點)',color:'#888',font:{size:11}},ticks:{color:'#555',maxTicksLimit:8,callback:v=>fmt(v)},grid:{color:'#1f2235'}},
        y:{title:{display:true,text:'機率密度',color:'#888',font:{size:11}},ticks:{color:'#888'},grid:{color:'#1f2235'}}
      },
      plugins:{
        legend:{position:'top',labels:{color:'#888',font:{size:10},filter:item=>item.text!=='直方圖'}},
        annotation:{annotations:{
          s2:{type:'box',xMin:mean-2*std,xMax:mean+2*std,backgroundColor:color+'08',borderWidth:0},
          s1:{type:'box',xMin:mean-std,xMax:mean+std,backgroundColor:color+'14',borderWidth:0},
          ml:{type:'line',xMin:mean,xMax:mean,borderColor:'#ff4757',borderWidth:1.5,borderDash:[4,4],label:{display:true,content:'均值',position:'start',color:'#ff4757',font:{size:9}}},
          mdl:{type:'line',xMin:median,xMax:median,borderColor:'#00d4aa',borderWidth:1.5,borderDash:[4,4],label:{display:true,content:'中位數',position:'start',color:'#00d4aa',font:{size:9}}},
          zl:{type:'line',xMin:0,xMax:0,borderColor:'rgba(255,255,255,0.25)',borderWidth:1}
        }}
      }
    }
  });
}

// ----- KDE overlay comparison -----
function drawKDECompare(id) {
  destroyChart(id);
  const datasets=distData.map((d,i)=>{
    const p=d.metrics.profits, mean=d.metrics.avgProfit, std=sampleStd(p);
    const kde=gaussianKDE(p);
    const lo=Math.min(...p)-2000, hi=Math.max(...p)+2000;
    const pts=[]; for(let j=0;j<200;j++){const x=lo+(hi-lo)*j/199;pts.push({x,y:kde(x)});}
    return{label:d.name+' (μ='+fmt(mean)+', σ='+fmt(std)+')',data:pts,borderColor:COLORS[i%10],borderWidth:2.5,pointRadius:0,tension:0.3,fill:false};
  });
  charts[id]=new Chart(document.getElementById(id),{type:'line',data:{datasets},
    options:{responsive:true,
      scales:{
        x:{type:'linear',title:{display:true,text:'單筆損益 (點)',color:'#888'},ticks:{color:'#555',callback:v=>fmt(v)},grid:{color:'#1f2235'}},
        y:{title:{display:true,text:'機率密度',color:'#888'},ticks:{color:'#888'},grid:{color:'#1f2235'}}
      },
      plugins:{legend:{position:'top',labels:{color:'#888',font:{size:11}}},
        annotation:{annotations:{zl:{type:'line',xMin:0,xMax:0,borderColor:'rgba(255,255,255,0.3)',borderWidth:1,borderDash:[4,4]}}}
      }
    }
  });
}

// ----- Box plot comparison -----
function drawBoxCompare(id) {
  destroyChart(id);
  const stats=distData.map((d,i)=>{
    const s=[...d.metrics.profits].sort((a,b)=>a-b), n=s.length;
    const q1=s[Math.floor(n*0.25)], med=s[Math.floor(n*0.5)], q3=s[Math.floor(n*0.75)];
    const iqr=q3-q1;
    const wLo=s.find(v=>v>=q1-1.5*iqr)||s[0];
    const wHi=[...s].reverse().find(v=>v<=q3+1.5*iqr)||s[n-1];
    return{q1,med,q3,wLo,wHi,mean:d.metrics.avgProfit};
  });
  const labels=distData.map(d=>d.name);
  const annotations={zl:{type:'line',yMin:0,yMax:0,borderColor:'rgba(255,255,255,0.3)',borderWidth:1,borderDash:[4,4]}};
  stats.forEach((b,i)=>{
    annotations['med'+i]={type:'line',yMin:b.med,yMax:b.med,xMin:i-0.22,xMax:i+0.22,borderColor:'#ffffff',borderWidth:2.5};
    annotations['mean'+i]={type:'point',xValue:i,yValue:b.mean,radius:5,backgroundColor:'#ff4757',borderColor:'#ff4757'};
  });
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
    data:{labels,datasets:[
      {label:'箱體 (Q1-Q3)',data:stats.map(b=>[b.q1,b.q3]),backgroundColor:distData.map((_,i)=>COLORS[i%10]+'66'),borderColor:distData.map((_,i)=>COLORS[i%10]),borderWidth:2,barPercentage:0.5},
      {label:'下鬚線',data:stats.map(b=>[b.wLo,b.q1]),backgroundColor:'rgba(255,255,255,0.15)',borderColor:distData.map((_,i)=>COLORS[i%10]+'88'),borderWidth:1,barPercentage:0.04},
      {label:'上鬚線',data:stats.map(b=>[b.q3,b.wHi]),backgroundColor:'rgba(255,255,255,0.15)',borderColor:distData.map((_,i)=>COLORS[i%10]+'88'),borderWidth:1,barPercentage:0.04}
    ]},
    options:{responsive:true,
      scales:{
        x:{ticks:{color:'#888',font:{size:11}},grid:{display:false}},
        y:{title:{display:true,text:'單筆損益 (點)',color:'#888'},ticks:{color:'#888',callback:v=>fmt(v)},grid:{color:'#1f2235'}}
      },
      plugins:{legend:{position:'top',labels:{color:'#888',font:{size:10}}},annotation:{annotations}}
    }
  });
}

// ----- Q-Q Plot -----
function drawQQChart(id, profits, color) {
  destroyChart(id);
  const sorted=[...profits].sort((a,b)=>a-b), n=sorted.length;
  const theoretical=[];for(let i=0;i<n;i++) theoretical.push(normalQuantile((i+0.5)/n));
  const data=theoretical.map((t,i)=>({x:t,y:sorted[i]}));
  const mx=theoretical.reduce((a,b)=>a+b,0)/n, my=sorted.reduce((a,b)=>a+b,0)/n;
  let ssxy=0,ssxx=0;for(let i=0;i<n;i++){ssxy+=(theoretical[i]-mx)*(sorted[i]-my);ssxx+=(theoretical[i]-mx)**2;}
  const slope=ssxx===0?1:ssxy/ssxx, intercept=my-slope*mx;
  const xMin=theoretical[0],xMax=theoretical[n-1];
  const refLine=[{x:xMin,y:slope*xMin+intercept},{x:xMax,y:slope*xMax+intercept}];
  const jb=jarqueBera(profits);
  charts[id]=new Chart(document.getElementById(id),{type:'scatter',
    data:{datasets:[
      {label:'觀察值',data,backgroundColor:color+'88',borderColor:color,pointRadius:2.5,order:2},
      {label:'參考線',data:refLine,type:'line',borderColor:'#ff4757',borderWidth:2,pointRadius:0,fill:false,order:1}
    ]},
    options:{responsive:true,
      scales:{
        x:{type:'linear',title:{display:true,text:'理論分位數',color:'#888',font:{size:11}},ticks:{color:'#555'},grid:{color:'#1f2235'}},
        y:{title:{display:true,text:'觀察值',color:'#888',font:{size:11}},ticks:{color:'#888',callback:v=>fmt(v)},grid:{color:'#1f2235'}}
      },
      plugins:{legend:{display:false},
        annotation:{annotations:{jbLabel:{type:'label',xValue:xMin+0.3,yValue:sorted[n-1]*0.85,
          content:['Jarque-Bera','JB='+jb.stat.toFixed(1),'p='+(jb.p<0.0001?'<0.0001':jb.p.toFixed(4)),jb.p<0.05?'→ 非常態':'→ 常態'],
          color:'#e0e0e0',font:{size:10},backgroundColor:'rgba(20,22,39,0.85)',borderColor:'var(--border)',borderWidth:1,padding:6}}}
      }
    }
  });
}
